      ;(function () {
        var params = new URLSearchParams(window.location.search)
        var p = params.get("p")
        if (!p) return

        try {
          var decoded = decodeURIComponent(p)
          if (decoded && decoded.charAt(0) === "/") {
            params.delete("p")
            var rest = params.toString()
            var newUrl = decoded + (rest ? (decoded.includes("?") ? "&" : "?") + rest : "")
            window.history.replaceState(null, "", newUrl)
          }
        } catch (e) {
          console.warn("Failed to restore route from ?p= parameter:", e)
        }
      })()
    </script>
